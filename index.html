<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Ottawa Rage — Streets of Winter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #05050a;
      width: 100%; height: 100%;
      overflow: hidden;
      touch-action: none;
      position: fixed;           /* prevent iOS bounce/scroll */
      inset: 0;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }

    /* ── Virtual gamepad — overlays the canvas ──────────────────────────────── */
    #gamepad {
      display: none;          /* shown only on touch devices via JS */
      position: fixed;
      inset: 0;
      pointer-events: none;   /* children re-enable as needed */
      z-index: 1000;
      user-select: none;
      -webkit-user-select: none;
    }

    /* D-pad cluster — bottom-left */
    #dpad {
      position: absolute;
      left: 12px;
      bottom: 28px;
      width: 140px;
      height: 140px;
      pointer-events: none;
    }
    .dpad-btn {
      position: absolute;
      width: 46px;
      height: 46px;
      background: rgba(255,255,255,0.10);
      border: 2px solid rgba(255,255,255,0.22);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: rgba(255,255,255,0.55);
      pointer-events: all;
      touch-action: none;
      cursor: pointer;
    }
    .dpad-btn:active { background: rgba(255,255,255,0.25); }
    #btn-up    { left: 47px; top: 0;    }
    #btn-down  { left: 47px; bottom: 0; }
    #btn-left  { left: 0;    top: 47px; }
    #btn-right { right: 0;   top: 47px; }

    /* Action buttons — bottom-right */
    #actions {
      position: absolute;
      right: 12px;
      bottom: 28px;
      width: 155px;
      height: 110px;
      pointer-events: none;
    }
    .action-btn {
      position: absolute;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.28);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      font-size: 11px;
      font-weight: bold;
      color: rgba(255,255,255,0.85);
      pointer-events: all;
      touch-action: none;
      cursor: pointer;
    }
    .action-btn:active { filter: brightness(1.5); }
    #btn-punch   { background: rgba(255,200,0,0.18);  left: 0;    bottom: 0; }
    #btn-kick    { background: rgba(255,100,30,0.18); right: 0;   bottom: 0; }
    #btn-special { background: rgba(80,160,255,0.18); left: 50px; top: 0;    }

    /* Menu pills — positioned above their respective button clusters */
    .menu-btn {
      position: absolute;
      padding: 6px 16px;
      border-radius: 14px;
      border: 1.5px solid rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      font-size: 10px;
      font-weight: bold;
      color: rgba(255,255,255,0.65);
      pointer-events: all;
      touch-action: none;
      cursor: pointer;
      background: rgba(0,0,0,0.35);
    }
    .menu-btn:active { filter: brightness(1.5); background: rgba(80,255,120,0.25); }
    /* START — right side, above action buttons */
    #btn-start { right: 18px; bottom: 155px; }
    /* BACK — left side, above d-pad */
    #btn-back  { left: 18px;  bottom: 185px; }
  </style>
</head>
<body>

  <!-- Virtual gamepad (visible on touch devices only) — overlays the canvas -->
  <div id="gamepad">
    <div id="dpad">
      <div class="dpad-btn" id="btn-up"    data-key="w">▲</div>
      <div class="dpad-btn" id="btn-down"  data-key="s">▼</div>
      <div class="dpad-btn" id="btn-left"  data-key="a">◀</div>
      <div class="dpad-btn" id="btn-right" data-key="d">▶</div>
    </div>
    <div id="actions">
      <div class="action-btn" id="btn-punch"   data-key="z">PUNCH</div>
      <div class="action-btn" id="btn-kick"    data-key="x">KICK</div>
      <div class="action-btn" id="btn-special" data-key="q">★ SPEC</div>
    </div>
    <div class="menu-btn" id="btn-start" data-key="Enter">START</div>
    <div class="menu-btn" id="btn-back"  data-key="Tab">BACK</div>
  </div>

  <!-- Kaplay.js -->
  <script src="https://unpkg.com/kaplay@3001/dist/kaplay.js"></script>

  <!-- Load order matters: constants → entities → game -->
  <script src="js/constants.js"></script>
  <script src="js/entities.js"></script>
  <script src="game.js"></script>

  <script>
    // ── Show gamepad only on real touch devices ───────────────────────────────
    if (window.matchMedia("(pointer: coarse)").matches) {
      document.getElementById("gamepad").style.display = "block";
    }

    // ── Virtual button → synthetic KeyboardEvent ─────────────────────────────
    // Kaplay listens for keyboard events on the <canvas>, not on window.
    // We must dispatch on the canvas so onKeyPress / isKeyDown pick them up.
    const _gameCanvas = document.querySelector("canvas");

    function fireKey(key, type) {
      const singleChar = key.length === 1;
      _gameCanvas.dispatchEvent(new KeyboardEvent(type, {
        key,
        code: singleChar ? "Key" + key.toUpperCase() : key,
        bubbles: true, cancelable: true,
      }));
    }

    document.querySelectorAll("[data-key]").forEach(btn => {
      const key = btn.dataset.key;

      btn.addEventListener("touchstart", e => {
        e.preventDefault();
        _gameCanvas.focus();          // keep canvas focused so Kaplay tracks keys
        fireKey(key, "keydown");
        fireKey(key, "keypress");
      }, { passive: false });

      btn.addEventListener("touchend", e => {
        e.preventDefault();
        fireKey(key, "keyup");
      }, { passive: false });

      // Mouse fallback for desktop testing
      btn.addEventListener("mousedown", () => { _gameCanvas.focus(); fireKey(key, "keydown"); fireKey(key, "keypress"); });
      btn.addEventListener("mouseup",   () => fireKey(key, "keyup"));
    });
  </script>
</body>
</html>
