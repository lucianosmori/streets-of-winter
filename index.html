<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ottawa Rage — Streets of Winter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #05050a;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }
  </style>
</head>
<body>
  <!-- Kaplay.js — pin to a specific version once you like the behaviour
       e.g. kaplay@3001.0.17.  https://kaplayjs.com -->
  <script src="https://unpkg.com/kaplay@3001/dist/kaplay.js"></script>

  <!-- Load order matters: constants → entities → game -->
  <script src="js/constants.js"></script>
  <script src="js/entities.js"></script>
  <script src="game.js"></script>
</body>
</html>
